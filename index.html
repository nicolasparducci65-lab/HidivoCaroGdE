<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CARO GdE — HIDIVO</title>
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --color-primary: #0c447c;
    --color-bg: #f4f3ee;
    --color-surface: #ffffff;
    --color-border: #d3d1c7;
    --color-text: #2c2c2a;
    --color-text-muted: #5f5e5a;
    --color-danger: #a32d2d;
    --color-success: #3b6d11;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--color-bg);
    color: var(--color-text);
    min-height: 100vh;
  }
  .auth-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .auth-card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 40px;
    max-width: 400px;
    width: 100%;
  }
  .auth-card h1 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .auth-card .subtitle {
    color: var(--color-text-muted);
    font-size: 14px;
    margin-bottom: 24px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
    margin-top: 16px;
  }
  input[type="email"], input[type="password"], input[type="text"] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--color-border);
    border-radius: 8px;
    font-size: 14px;
  }
  button {
    width: 100%;
    margin-top: 24px;
    padding: 11px;
    background: var(--color-primary);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .msg {
    margin-top: 16px;
    font-size: 13px;
    padding: 10px 12px;
    border-radius: 8px;
  }
  .msg.error { background: #fcebeb; color: var(--color-danger); }
  .msg.success { background: #eaf3de; color: var(--color-success); }
  .hidden { display: none !important; }
  #app-root { min-height: 100vh; }
  .app-shell { display: flex; min-height: 100vh; }
  .sidebar {
    width: 220px;
    background: var(--color-surface);
    border-right: 1px solid var(--color-border);
    padding: 20px 0;
    flex-shrink: 0;
  }
  .sidebar .brand {
    font-weight: 600;
    font-size: 16px;
    padding: 0 20px 16px;
  }
  .sidebar nav a {
    display: block;
    padding: 10px 20px;
    color: var(--color-text);
    text-decoration: none;
    font-size: 14px;
  }
  .sidebar nav a:hover, .sidebar nav a.active {
    background: var(--color-bg);
  }
  .main-content {
    flex: 1;
    padding: 32px;
    overflow-y: auto;
  }

  /* ---- Catálogo: tabla, modal, controles ---- */
  .module-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .module-header h2 {
    font-size: 18px;
    font-weight: 600;
  }
  .btn {
    width: auto;
    margin-top: 0;
    padding: 9px 16px;
    background: var(--color-primary);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }
  .btn-secondary {
    background: var(--color-surface);
    color: var(--color-text);
    border: 1px solid var(--color-border);
  }
  .search-bar {
    margin-bottom: 16px;
  }
  .search-bar input {
    max-width: 300px;
  }
  table.data-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 8px;
    overflow: hidden;
  }
  table.data-table th, table.data-table td {
    text-align: left;
    padding: 10px 14px;
    font-size: 13px;
    border-bottom: 1px solid var(--color-border);
  }
  table.data-table th {
    background: var(--color-bg);
    font-weight: 500;
    color: var(--color-text-muted);
  }
  table.data-table tr:last-child td { border-bottom: none; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 500;
  }
  .badge.activo { background: #eaf3de; color: var(--color-success); }
  .badge.inactivo { background: #f1efe8; color: var(--color-text-muted); }
  .row-actions a {
    color: var(--color-primary);
    text-decoration: none;
    font-size: 13px;
    margin-right: 12px;
    cursor: pointer;
  }
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(44, 44, 42, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .modal-card {
    background: var(--color-surface);
    border-radius: 12px;
    padding: 28px;
    max-width: 440px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
  }
  .modal-card h3 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 16px;
  }
  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }
  .modal-actions .btn { flex: 1; margin-top: 0; }
  .field-row { display: flex; gap: 12px; }
  .field-row > div { flex: 1; }
  select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--color-border);
    border-radius: 8px;
    font-size: 14px;
    background: white;
  }

  /* ---- Proformas: modal grande con tabla de ítems ---- */
  .modal-card.wide { max-width: 720px; }
  .estado-select-inline {
    width: auto;
    display: inline-block;
    padding: 6px 10px;
    font-size: 13px;
  }
  table.items-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 8px;
  }
  table.items-table th {
    text-align: left;
    font-size: 12px;
    color: var(--color-text-muted);
    font-weight: 500;
    padding: 6px 8px;
    border-bottom: 1px solid var(--color-border);
  }
  table.items-table td {
    padding: 6px 8px;
    border-bottom: 1px solid var(--color-border);
  }
  table.items-table input, table.items-table select {

  }
  table.items-table .col-cantidad input,

  table.items-table .col-subtotal {

    font-size: 13px;
    padding-right: 8px;
  }
  table.items-table .col-eliminar {
    width: 28px;
    text-align: center;
    cursor: pointer;
    color: var(--color-danger);
  }
  .totales-box {
    margin-top: 16px;
    padding: 14px 16px;
    background: var(--color-bg);
    border-radius: 8px;
  }
  .totales-box .fila {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 3px 0;
  }
  .totales-box .fila.total {
    font-weight: 600;
    font-size: 15px;
    border-top: 1px solid var(--color-border);
    margin-top: 6px;
    padding-top: 8px;
  }
  .readonly-banner {
    background: #faeeda;
    color: #854f0b;
    font-size: 13px;
    padding: 8px 12px;
    border-radius: 8px;
    margin-bottom: 12px;

  .filter-pills {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .filter-pills button {
    width: auto;
    margin-top: 0;
    padding: 6px 14px;
    font-size: 13px;
    background: var(--color-surface);
    color: var(--color-text-muted);
    border: 1px solid var(--color-border);
  }
  .filter-pills button.active {
    background: var(--color-primary);
    color: white;
    border-color: var(--color-primary);
  }

  /* ---- Contratos: tabs y comunicaciones ---- */
  .modal-card.extra-wide { max-width: 860px; }
  .tabs-bar {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--color-border);
    margin-bottom: 20px;
  }
  .tabs-bar button {
    width: auto;
    margin-top: 0;
    padding: 10px 16px;
    background: transparent;
    color: var(--color-text-muted);
    border: none;
    border-bottom: 2px solid transparent;
    border-radius: 0;
    font-size: 14px;
  }
  .tabs-bar button.active {
    color: var(--color-primary);
    border-bottom-color: var(--color-primary);

  .comunicacion-row {

    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .comunicacion-row .meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .comunicacion-row .meta-left {
    display: flex;
    gap: 8px;
    align-items: center;
    font-size: 13px;
  }
  .comunicacion-row .numero {
    font-weight: 600;
    font-size: 13px;
  }
  .badge.direccion-enviada { background: #e6f1fb; color: #0c447c; }
  .badge.direccion-recibida { background: #eeedfe; color: #3c3489; }
  .badge.estado-pendiente { background: #faeeda; color: #854f0b; }
  .badge.estado-respondida { background: #eaf3de; color: #3b6d11; }
  .comunicacion-row .asunto {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 2px;
  }
  .comunicacion-row .contenido {
    font-size: 13px;
    color: var(--color-text-muted);
  }
  .comunicacion-row .respuesta-de {
    font-size: 12px;
    color: var(--color-text-muted);
    margin-top: 6px;
    font-style: italic;
  }
  textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--color-border);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
    min-height: 70px;
  }
  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 16px;
  }
  .checkbox-row input[type="checkbox"] {
    width: auto;
    margin: 0;
  }
  .checkbox-row label {
    margin: 0;
  }

  /* ---- Cartera ---- */
  .badge.cartera-pendiente { background: #faeeda; color: #854f0b; }
  .badge.cartera-parcial { background: #e6f1fb; color: #0c447c; }
  .badge.cartera-pagado { background: #eaf3de; color: #3b6d11; }
  .badge.cartera-vencido { background: #fcebeb; color: #a32d2d; }
  .saldo-bar {
    width: 100%;
    height: 6px;
    background: var(--color-border);
    border-radius: 100px;
    overflow: hidden;
    margin-top: 4px;
  }
  .saldo-bar .fill {
    height: 100%;
    background: var(--color-success);
  }
  .abono-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 8px 0;
    border-bottom: 1px solid var(--color-border);
  }
  .abono-row:last-child { border-bottom: none; }
  .resumen-cartera {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
  }
  .resumen-card {
    flex: 1;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 8px;
    padding: 14px 18px;
  }
  .resumen-card .label {
    font-size: 12px;
    color: var(--color-text-muted);
  }
  .resumen-card .valor {
    font-size: 20px;
    font-weight: 600;
    margin-top: 4px;
  }

  /* ---- Tesorería ---- */
  .cuentas-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }
  .cuenta-card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 10px;
    padding: 16px;
  }
  .cuenta-card .nombre { font-size: 14px; font-weight: 500; }
  .cuenta-card .banco { font-size: 12px; color: var(--color-text-muted); margin-top: 2px; }
  .cuenta-card .saldo { font-size: 22px; font-weight: 600; margin-top: 10px; }
  .cuenta-card.add-new {
    border-style: dashed;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--color-text-muted);
    font-size: 14px;
  }
  .subtabs-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .subtabs-bar button {
    width: auto;
    margin-top: 0;
    padding: 8px 16px;
    background: var(--color-surface);
    color: var(--color-text-muted);
    border: 1px solid var(--color-border);
    font-size: 13px;
  }
  .subtabs-bar button.active {
    background: var(--color-primary);
    color: white;
    border-color: var(--color-primary);
  }
  .badge.mov-ingreso { background: #eaf3de; color: #3b6d11; }
  .badge.mov-egreso { background: #fcebeb; color: #a32d2d; }
  .monto-ingreso { color: var(--color-success); font-weight: 500; }
  .monto-egreso { color: var(--color-danger); font-weight: 500; }
  .nomina-detalle-row {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
    gap: 10px;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--color-border);
    font-size: 13px;
  }
  .nomina-detalle-row.header {
    font-weight: 500;
    color: var(--color-text-muted);
    font-size: 12px;
  }
  .nomina-detalle-row input { padding: 6px 8px; font-size: 13px; }

  /* ---- Chat ---- */
  .chat-shell {
    display: flex;
    height: calc(100vh - 64px);
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 10px;
    overflow: hidden;
  }
  .chat-sidebar {
    width: 220px;
    border-right: 1px solid var(--color-border);
    padding: 16px 0;
    flex-shrink: 0;
    overflow-y: auto;
  }
  .chat-sidebar h4 {
    font-size: 12px;
    font-weight: 500;
    color: var(--color-text-muted);
    padding: 0 16px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .chat-canal-item {
    padding: 9px 16px;
    font-size: 14px;
    cursor: pointer;
  }
  .chat-canal-item.active { background: var(--color-bg); font-weight: 500; }
  .chat-presencia-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px;
    font-size: 13px;
  }
  .chat-presencia-dot {
    width: 8px;
    height: 8px;
    border-radius: 100px;
    background: var(--color-border);
    flex-shrink: 0;
  }
  .chat-presencia-dot.online { background: var(--color-success); }
  .chat-main {
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .chat-bubble {
    max-width: 60%;
    padding: 9px 13px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.4;
  }
  .chat-bubble.mine {
    align-self: flex-end;
    background: var(--color-primary);
    color: white;
  }
  .chat-bubble.theirs {
    align-self: flex-start;
    background: var(--color-bg);
  }
  .chat-bubble .autor {
    font-size: 11px;
    font-weight: 500;
    margin-bottom: 3px;
    opacity: 0.8;
  }
  .chat-bubble .hora {
    font-size: 10px;
    opacity: 0.6;
    margin-top: 3px;
    text-align: right;
  }
  .chat-input-bar {
    display: flex;
    gap: 10px;
    padding: 14px 20px;
    border-top: 1px solid var(--color-border);
  }
  .chat-input-bar input {
    flex: 1;
  }
  .chat-input-bar button {
    width: auto;
    margin-top: 0;
    padding: 10px 20px;
  }
  .chat-bubble-wrap {
    display: flex;
    flex-direction: column;
    max-width: 60%;
    position: relative;
  }
  .chat-bubble-wrap.mine { align-self: flex-end; }
  .chat-bubble-wrap.theirs { align-self: flex-start; }
  .chat-bubble-wrap.hilo {
    margin-left: 28px;
    max-width: calc(60% - 28px);
  }
  .chat-hilo-indicador {
    font-size: 11px;
    color: var(--color-text-muted);
    margin-bottom: 3px;
    padding-left: 4px;
  }
  .chat-bubble {
    padding: 9px 13px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.4;
    position: relative;
  }
  .chat-bubble.mine {
    background: var(--color-primary);
    color: white;
  }
  .chat-bubble.theirs {
    background: var(--color-bg);
  }
  .chat-bubble.eliminado {
    background: transparent;
    border: 1px dashed var(--color-border);
    color: var(--color-text-muted);
    font-style: italic;
  }
  .chat-bubble .autor {
    font-size: 11px;
    font-weight: 500;
    margin-bottom: 3px;

  }

    font-size: 10px;
    opacity: 0.6;
    margin-top: 3px;
    text-align: right;
  }
  .chat-bubble-actions {
    display: flex;
    gap: 10px;
    font-size: 11px;
    margin-top: 3px;

  .chat-bubble-actions a {

    cursor: pointer;
  }

  .chat-thread-panel {
    width: 340px;
    border-left: 1px solid var(--color-border);

    flex-shrink: 0;
  }
  .chat-thread-header {
    display: flex;
    justify-content: space-between;

    flex: 1;
    overflow-y: auto;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .chat-respuestas-link {
    font-size: 12px;
    color: var(--color-primary);
    cursor: pointer;
    margin-top: 3px;
    padding-left: 4px;
  }
</style>

<script>
// =====================================================================
// CONFIGURACIÓN SUPABASE — CARO GdE

function showScreen(screenId) {
  ['screen-login', 'screen-complete-profile', 'screen-app'].forEach(id => {
    document.getElementById(id).classList.toggle('hidden', id !== screenId);
  });
}

function showMsg(elementId, text, type) {
  const el = document.getElementById(elementId);
  el.className = 'msg ' + type;
  el.textContent = text;
}

function clearMsg(elementId) {
  const el = document.getElementById(elementId);
  el.className = '';
  el.textContent = '';
}

// =====================================================================

// =====================================================================
document.getElementById('btn-send-magic-link').addEventListener('click', async () => {
  const email = document.getElementById('login-email').value.trim();
  clearMsg('login-msg');

  if (!email) {
    showMsg('login-msg', 'Ingresa tu correo electrónico.', 'error');
    return;
  }

  const btn = document.getElementById('btn-send-magic-link');
  btn.disabled = true;
  btn.textContent = 'Enviando...';

  const { error } = await sb.auth.signInWithOtp({
    email: email,
    options: {
      emailRedirectTo: window.location.origin + window.location.pathname
    }
  });

  btn.disabled = false;
  btn.textContent = 'Enviar enlace de acceso';

  if (error) {
    console.error('Error completo de signInWithOtp:', error);
    const mensaje = error.message || error.error_description || JSON.stringify(error);
    showMsg('login-msg', 'Error: ' + mensaje, 'error');
  } else {
    showMsg('login-msg', 'Te enviamos un enlace de acceso a tu correo. Revisa tu bandeja de entrada.', 'success');
  }
});

document.getElementById('btn-complete-profile').addEventListener('click', async () => {
  const nombre = document.getElementById('complete-nombre').value.trim();
  const password = document.getElementById('complete-password').value;
  clearMsg('complete-msg');

  if (!nombre || !password) {
    showMsg('complete-msg', 'Completa todos los campos.', 'error');
    return;
  }
  if (password.length < 6) {
    showMsg('complete-msg', 'La contraseña debe tener al menos 6 caracteres.', 'error');
    return;
  }

  const btn = document.getElementById('btn-complete-profile');
  btn.disabled = true;
  btn.textContent = 'Guardando...';

  // Actualiza contraseña del usuario en Auth
  const { data: userData, error: authError } = await sb.auth.updateUser({ password: password });

  if (authError) {
    btn.disabled = false;
    btn.textContent = 'Guardar y entrar';
    showMsg('complete-msg', 'Error: ' + authError.message, 'error');
    return;
  }

  // Actualiza el nombre en la tabla perfiles
  const { error: profileError } = await sb
    .from('perfiles')
    .update({ nombre_completo: nombre })
    .eq('id', userData.user.id);

  btn.disabled = false;
  btn.textContent = 'Guardar y entrar';

  if (profileError) {
    showMsg('complete-msg', 'Error guardando perfil: ' + profileError.message, 'error');
    return;
  }

  await loadAppShell();
});

function closeModal() {
  document.getElementById('modal-container').innerHTML = '';
}

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

      <thead>

          <th>Modalidad de tarifa</th>
          <th>Tarifa referencial</th>
          <th>Estado</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="servicios-tbody">
        <tr><td colspan="6">Cargando...</td></tr>
      </tbody>

  `;

    pintarServicios(filtrar(servicios_cache, e.target.value, ['nombre', 'codigo']));
  });

  const { data, error } = await sb.from('servicios').select('*').order('created_at', { ascending: false });
  if (error) {
    document.getElementById('servicios-tbody').innerHTML =

    return;
  }
  servicios_cache = data;

}

function filtrar(arr, texto, campos) {
  const t = texto.trim().toLowerCase();
  if (!t) return arr;
  return arr.filter(item => campos.some(c => (item[c] || '').toLowerCase().includes(t)));
}

const MODALIDAD_LABELS = {
  fijo_mensual: 'Fijo mensual',
  porcentaje_obra: '% del valor de obra',
  por_hora: 'Por hora',
  por_hito: 'Por hito'
};

  const tbody = document.getElementById('servicios-tbody');

    return;
  }
  tbody.innerHTML = lista.map(s => `
    <tr>
      <td>${escapeHtml(s.codigo)}</td>
      <td>${escapeHtml(s.nombre)}</td>
      <td>${escapeHtml(MODALIDAD_LABELS[s.modalidad_tarifa] || s.modalidad_tarifa || '—')}</td>
      <td>${s.tarifa_referencial != null ? '$' + Number(s.tarifa_referencial).toFixed(2) : '—'}</td>
      <td><span class="badge ${s.activo ? 'activo' : 'inactivo'}">${s.activo ? 'Activo' : 'Inactivo'}</span></td>
      <td class="row-actions">
        <a onclick="abrirModalServicio('${s.id}')">Editar</a>
        <a onclick="toggleActivoServicio('${s.id}', ${s.activo})">${s.activo ? 'Desactivar' : 'Activar'}</a>

    </tr>
  `).join('');
}

          <option value="por_hora" ${servicio?.modalidad_tarifa === 'por_hora' ? 'selected' : ''}>Por hora</option>
          <option value="por_hito" ${servicio?.modalidad_tarifa === 'por_hito' ? 'selected' : ''}>Por hito</option>

async function guardarServicio(id) {
  const payload = {
    codigo: document.getElementById('serv-codigo').value.trim(),
    nombre: document.getElementById('serv-nombre').value.trim(),
    descripcion: document.getElementById('serv-descripcion').value.trim(),

  if (!payload.nombre) {

  const query = id
    ? sb.from('servicios').update(payload).eq('id', id)
    : sb.from('servicios').insert(payload);

  const { error } = await query;
  if (error) {
    showMsg('serv-msg', 'Error: ' + error.message, 'error');

  closeModal();
  renderServicios();

      <button data-estado="borrador">Borrador</button>
      <button data-estado="enviada">Enviada</button>
      <button data-estado="aprobada">Aprobada</button>
      <button data-estado="rechazada">Rechazada</button>
      <button data-estado="vencida">Vencida</button>
    </div>
    <table class="data-table">
      <thead>
        <tr>
          <th>Número</th>
          <th>Cliente</th>
          <th>Fecha emisión</th>
          <th>Total</th>
          <th>Estado</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="proformas-tbody">
        <tr><td colspan="6">Cargando...</td></tr>
      </tbody>
    </table>
  `;

  document.getElementById('proformas-filtros').addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    document.querySelectorAll('#proformas-filtros button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    proformas_filtro_estado = btn.dataset.estado;
    pintarProformas();
  });

  // Cargamos clientes en cache también, los necesitamos para el modal
  if (!clientes_cache.length) {
    const { data } = await sb.from('clientes').select('*').eq('activo', true);
    clientes_cache = data || [];
  }
  if (!servicios_cache.length) {
    const { data } = await sb.from('servicios').select('*').eq('activo', true);
    servicios_cache = data || [];
  }

  const { data, error } = await sb
    .from('proformas')
    .select('*, clientes(razon_social)')
    .order('created_at', { ascending: false });

  if (error) {
    document.getElementById('proformas-tbody').innerHTML =
      '<tr><td colspan="6">Error cargando proformas: ' + escapeHtml(error.message) + '</td></tr>';
    return;
  }
  proformas_cache = data;
  pintarProformas();
}

function pintarProformas() {
  const tbody = document.getElementById('proformas-tbody');
  let lista = proformas_cache;
  if (proformas_filtro_estado !== 'todas') {
    lista = lista.filter(p => p.estado === proformas_filtro_estado);
  }
  if (!lista.length) {
    tbody.innerHTML = '<tr><td colspan="6">No hay proformas en este filtro.</td></tr>';
    return;
  }
  tbody.innerHTML = lista.map(p => `
    <tr>
      <td>${p.numero ?? '—'}</td>
      <td>${escapeHtml(p.clientes?.razon_social) || '—'}</td>
      <td>${p.fecha_emision || '—'}</td>
      <td>$${Number(p.total || 0).toFixed(2)}</td>
      <td><span class="badge ${ESTADO_PROFORMA_BADGE[p.estado] || 'inactivo'}">${ESTADO_PROFORMA_LABELS[p.estado] || p.estado}</span></td>
      <td class="row-actions">
        <a onclick="abrirModalProforma('${p.id}')">${p.estado === 'aprobada' ? 'Ver' : 'Editar'}</a>
        ${p.estado === 'aprobada' ? `<a onclick="convertirAContrato('${p.id}')">Convertir a contrato</a>` : ''}
      </td>
    </tr>
  `).join('');
}

async function abrirModalProforma(id) {
  let proforma = null;
  modal_items = [];

  modal_proforma_bloqueada = false;

  if (id) {
    proforma = proformas_cache.find(p => p.id === id);
    const { data: items, error } = await sb
      .from('proforma_items')
      .select('*')
      .eq('proforma_id', id);
    if (!error) modal_items = items || [];
    modal_proforma_bloqueada = proforma?.estado === 'aprobada';
  }

  const esEdicion = !!proforma;

  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target === this) closeModal()">
      <div class="modal-card wide">
        <h3>${esEdicion ? 'Proforma ' + (proforma.numero ?? '') : 'Nueva proforma'}</h3>
        ${modal_proforma_bloqueada ? '<div class="readonly-banner">Esta proforma está aprobada. Los ítems y montos quedaron congelados; solo puedes ver el detalle o convertirla a contrato.</div>' : ''}
        <div class="field-row">
          <div>
            <label>Cliente</label>
            <select id="prof-cliente" ${modal_proforma_bloqueada ? 'disabled' : ''}>
              <option value="">Selecciona un cliente</option>
              ${clientes_cache.map(c => `<option value="${c.id}" ${proforma?.cliente_id === c.id ? 'selected' : ''}>${escapeHtml(c.razon_social)}</option>`).join('')}
            </select>
          </div>
          <div>
            <label>Estado</label>
            <select id="prof-estado" onchange="onCambioEstadoProforma()">
              ${Object.entries(ESTADO_PROFORMA_LABELS).map(([k, v]) =>
                `<option value="${k}" ${(proforma?.estado || 'borrador') === k ? 'selected' : ''}>${v}</option>`
              ).join('')}
            </select>
          </div>
        </div>
        <div class="field-row">
          <div>
            <label>Fecha de emisión</label>
            <input type="date" id="prof-fecha-emision" value="${proforma?.fecha_emision || new Date().toISOString().slice(0,10)}" ${modal_proforma_bloqueada ? 'disabled' : ''}>
          </div>
          <div>
            <label>Fecha de validez</label>
            <input type="date" id="prof-fecha-validez" value="${proforma?.fecha_validez || ''}" ${modal_proforma_bloqueada ? 'disabled' : ''}>
          </div>
        </div>

        <label style="margin-top:20px;">Ítems</label>
        <table class="items-table">
          <thead>
            <tr>
              <th>Servicio</th>
              <th class="col-cantidad">Cant.</th>
              <th class="col-precio">Precio unit.</th>
              <th class="col-subtotal">Subtotal</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="prof-items-tbody"></tbody>
        </table>
        ${!modal_proforma_bloqueada ? '<button class="btn btn-secondary" style="margin-top:10px;" onclick="agregarItemProforma()">+ Agregar ítem</button>' : ''}

        <div class="totales-box">
          <div class="fila"><span>Subtotal</span><span id="prof-subtotal-display">$0.00</span></div>
          <div class="fila"><span>IVA (15%)</span><span id="prof-iva-display">$0.00</span></div>
          <div class="fila total"><span>Total</span><span id="prof-total-display">$0.00</span></div>
        </div>

        <div id="prof-msg"></div>
        <div class="modal-actions">
          <button class="btn btn-secondary" onclick="closeModal()">${modal_proforma_bloqueada ? 'Cerrar' : 'Cancelar'}</button>
          ${!modal_proforma_bloqueada ? `<button class="btn" onclick="guardarProforma()">Guardar</button>` : ''}
        </div>
      </div>
    </div>
  `;

  if (modal_items.length === 0 && !modal_proforma_bloqueada) {
    agregarItemProforma();
  } else {
    pintarItemsProforma();
  }
}

function onCambioEstadoProforma() {
  // Si el usuario cambia el estado a "aprobada" desde el modal de una
  // proforma nueva o en edición, solo afecta al guardar; el bloqueo
  // visual de ítems se aplica la próxima vez que se abra ya aprobada.
}

function agregarItemProforma() {
  modal_items.push({ servicio_id: '', descripcion: '', cantidad: 1, precio_unitario: 0 });
  pintarItemsProforma();
}

function eliminarItemProforma(idx) {
  modal_items.splice(idx, 1);
  pintarItemsProforma();
}

function actualizarItemProforma(idx, campo, valor) {
  modal_items[idx][campo] = valor;
  if (campo === 'servicio_id') {
    const serv = servicios_cache.find(s => s.id === valor);
    if (serv) {
      modal_items[idx].precio_unitario = serv.tarifa_referencial || 0;
      modal_items[idx].descripcion = serv.nombre;
    }
  }
  pintarItemsProforma();
}

function pintarItemsProforma() {
  const tbody = document.getElementById('prof-items-tbody');
  if (!tbody) return;

  tbody.innerHTML = modal_items.map((item, idx) => {
    const subtotal = (parseFloat(item.cantidad) || 0) * (parseFloat(item.precio_unitario) || 0);
    if (modal_proforma_bloqueada) {
      return `
        <tr>
          <td>${escapeHtml(item.descripcion)}</td>
          <td class="col-cantidad">${item.cantidad}</td>
          <td class="col-precio">$${Number(item.precio_unitario).toFixed(2)}</td>
          <td class="col-subtotal">$${subtotal.toFixed(2)}</td>
          <td></td>
        </tr>
      `;
    }
    return `
      <tr>
        <td>
          <select onchange="actualizarItemProforma(${idx}, 'servicio_id', this.value)">
            <option value="">Selecciona...</option>
            ${servicios_cache.map(s => `<option value="${s.id}" ${item.servicio_id === s.id ? 'selected' : ''}>${escapeHtml(s.nombre)}</option>`).join('')}
          </select>
        </td>
        <td class="col-cantidad">
          <input type="text" value="${item.cantidad}" onchange="actualizarItemProforma(${idx}, 'cantidad', this.value)">
        </td>
        <td class="col-precio">
          <input type="text" value="${item.precio_unitario}" onchange="actualizarItemProforma(${idx}, 'precio_unitario', this.value)">
        </td>
        <td class="col-subtotal">$${subtotal.toFixed(2)}</td>
        <td class="col-eliminar" onclick="eliminarItemProforma(${idx})">✕</td>
      </tr>
    `;
  }).join('');

  calcularTotalesProforma();
}

function calcularTotalesProforma() {
  const subtotal = modal_items.reduce((acc, item) =>
    acc + (parseFloat(item.cantidad) || 0) * (parseFloat(item.precio_unitario) || 0), 0);
  const iva = subtotal * IVA_TASA;
  const total = subtotal + iva;

  document.getElementById('prof-subtotal-display').textContent = '$' + subtotal.toFixed(2);
  document.getElementById('prof-iva-display').textContent = '$' + iva.toFixed(2);
  document.getElementById('prof-total-display').textContent = '$' + total.toFixed(2);

  return { subtotal, iva, total };
}

async function guardarProforma() {
  const clienteId = document.getElementById('prof-cliente').value;
  const estado = document.getElementById('prof-estado').value;
  const fechaEmision = document.getElementById('prof-fecha-emision').value;
  const fechaValidez = document.getElementById('prof-fecha-validez').value;

  if (!clienteId) {
    showMsg('prof-msg', 'Selecciona un cliente.', 'error');
    return;
  }
  if (modal_items.length === 0 || modal_items.some(i => !i.servicio_id)) {
    showMsg('prof-msg', 'Agrega al menos un ítem y selecciona el servicio en cada línea.', 'error');
    return;
  }

  const { subtotal, iva, total } = calcularTotalesProforma();

  const payload = {
    cliente_id: clienteId,
    estado: estado,
    fecha_emision: fechaEmision || null,
    fecha_validez: fechaValidez || null,
    subtotal: subtotal,
    iva: iva,
    total: total
  };

  let proformaId = modal_proforma_id;

  if (proformaId) {
    const { error } = await sb.from('proformas').update(payload).eq('id', proformaId);
    if (error) { showMsg('prof-msg', 'Error: ' + error.message, 'error'); return; }
  } else {
    // Calcular siguiente número correlativo
    const maxNumero = proformas_cache.reduce((max, p) => Math.max(max, p.numero || 0), 0);
    payload.numero = maxNumero + 1;
    const { data, error } = await sb.from('proformas').insert(payload).select().single();
    if (error) { showMsg('prof-msg', 'Error: ' + error.message, 'error'); return; }
    proformaId = data.id;
  }

  // Reescribir los ítems: borrar los anteriores y volver a insertar
  // (más simple y confiable que diffear altas/bajas/cambios)
  await sb.from('proforma_items').delete().eq('proforma_id', proformaId);

  const itemsPayload = modal_items.map(item => ({
    proforma_id: proformaId,
    servicio_id: item.servicio_id,
    descripcion: item.descripcion,
    cantidad: parseFloat(item.cantidad) || 0,
    precio_unitario: parseFloat(item.precio_unitario) || 0,
    subtotal: (parseFloat(item.cantidad) || 0) * (parseFloat(item.precio_unitario) || 0)
  }));

  const { error: itemsError } = await sb.from('proforma_items').insert(itemsPayload);
  if (itemsError) {
    showMsg('prof-msg', 'Proforma guardada, pero hubo un error con los ítems: ' + itemsError.message, 'error');
    return;
  }

  closeModal();
  renderProformas();
}

async function convertirAContrato(proformaId) {
  const proforma = proformas_cache.find(p => p.id === proformaId);
  if (!proforma) return;

  if (!confirm('¿Convertir la proforma ' + (proforma.numero ?? '') + ' en un contrato? Esto creará un nuevo contrato vigente con el monto total de la proforma.')) {
    return;
  }

  // Calculamos el siguiente número correlativo de contrato consultando
  // el máximo actual (mismo patrón usado en Proformas)
  const { data: existentes } = await sb.from('contratos').select('numero');
  const maxNumero = (existentes || []).reduce((max, c) => {
    const n = parseInt(c.numero) || 0;
    return Math.max(max, n);
  }, 0);

  const payload = {
    numero: String(maxNumero + 1),
    cliente_id: proforma.cliente_id,
    proforma_origen_id: proforma.id,
    monto_total: proforma.total,
    estado: 'vigente'
  };

  const { data, error } = await sb.from('contratos').insert(payload).select().single();
  if (error) {
    alert('Error al crear el contrato: ' + error.message);
    return;
  }

  alert('Contrato N.° ' + payload.numero + ' creado correctamente. Podrás verlo en el módulo de Contratos.');
  renderProformas();
}

    cont.innerHTML = '<p style="color:var(--color-text-muted);font-size:13px;">No hay comunicaciones registradas para este contrato.</p>';
    return;
  }

  cont.innerHTML = modal_comunicaciones.map(com => {
    const respuestaDe = com.comunicacion_relacionada_id
      ? modal_comunicaciones.find(c => c.id === com.comunicacion_relacionada_id)
      : null;
    const estadoBadge = com.estado_respuesta === 'pendiente'
      ? '<span class="badge estado-pendiente">Pendiente de respuesta</span>'
      : com.estado_respuesta === 'respondida'
        ? '<span class="badge estado-respondida">Respondida</span>'
        : '';

    return `
      <div class="comunicacion-row">
        <div class="meta">
          <div class="meta-left">
            <span class="numero">N.° ${com.numero}</span>
            <span class="badge direccion-${com.direccion}">${com.direccion === 'enviada' ? 'Enviada' : 'Recibida'}</span>
            <span style="color:var(--color-text-muted);">${com.tipo || ''}</span>
            <span style="color:var(--color-text-muted);">${com.fecha || ''}</span>
          </div>
          ${estadoBadge}
        </div>
        <div class="asunto">${escapeHtml(com.asunto)}</div>
        <div class="contenido">${escapeHtml(com.contenido)}</div>
        ${respuestaDe ? `<div class="respuesta-de">Responde a la comunicación N.° ${respuestaDe.numero}</div>` : ''}
      </div>
    `;
  }).join('');
}

        </select>
      ` : ''}

        <button class="btn btn-secondary" onclick="document.getElementById('comunicaciones-form-wrap').innerHTML=''">Cancelar</button>

async function guardarComunicacion() {
  const asunto = document.getElementById('com-asunto').value.trim();
  if (!asunto) {
    showMsg('com-msg', 'El asunto es obligatorio.', 'error');
    return;
  }

  const maxNumero = modal_comunicaciones.reduce((max, c) => Math.max(max, c.numero || 0), 0);
  const relacionadaEl = document.getElementById('com-relacionada');

  const payload = {
    contrato_id: modal_contrato_id,
    numero: maxNumero + 1,
    direccion: document.getElementById('com-direccion').value,
    tipo: document.getElementById('com-tipo').value,
    asunto: asunto,
    contenido: document.getElementById('com-contenido').value.trim(),
    remitente: document.getElementById('com-remitente').value.trim() || null,
    destinatario: document.getElementById('com-destinatario').value.trim() || null,
    fecha: document.getElementById('com-fecha').value || null,
    requiere_respuesta: document.getElementById('com-requiere-respuesta').checked,
    estado_respuesta: document.getElementById('com-requiere-respuesta').checked ? 'pendiente' : 'n/a',
    comunicacion_relacionada_id: relacionadaEl && relacionadaEl.value ? relacionadaEl.value : null
  };

  const { error } = await sb.from('contrato_comunicaciones').insert(payload);
  if (error) {
    showMsg('com-msg', 'Error: ' + error.message, 'error');
    return;
  }

  // Recargar comunicaciones (el trigger ya habrá marcado la original como respondida)
  const { data } = await sb
    .from('contrato_comunicaciones')
    .select('*')
    .eq('contrato_id', modal_contrato_id)
    .order('numero', { ascending: false });
  modal_comunicaciones = data || [];

  document.getElementById('comunicaciones-form-wrap').innerHTML = '';
  pintarListaComunicaciones();

  // Refrescar el contador en la pestaña
  const tabBtn = document.querySelector('#contrato-tabs button[data-tab="comunicaciones"]');
  if (tabBtn) tabBtn.textContent = 'Comunicaciones (' + modal_comunicaciones.length + ')';
}

// FLUJO PRINCIPAL: determinar qué pantalla mostrar al cargar

async function loadAppShell() {
  showScreen('screen-app');
}

async function checkProfileCompleteness(userId) {
  const { data, error } = await sb
    .from('perfiles')
    .select('nombre_completo')
    .eq('id', userId)
    .single();

  if (error) {
    console.error('Error verificando perfil:', error);
    return false;
  }
  return !!(data && data.nombre_completo);
}

async function init() {
  const { data: { session } } = await sb.auth.getSession();

  if (!session) {
    showScreen('screen-login');
    return;
  }

  const isComplete = await checkProfileCompleteness(session.user.id);

  if (isComplete) {
    await loadAppShell();
  } else {
    showScreen('screen-complete-profile');
  }
}

// Escucha cambios de sesión (ej. cuando el magic link confirma el login)
sb.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN') {
    init();
  } else if (event === 'SIGNED_OUT') {
    showScreen('screen-login');
  }
});

// MÓDULO: CARTERA (CxC y CxP)
// =====================================================================
const ESTADO_CARTERA_LABELS = { pendiente: 'Pendiente', parcial: 'Parcial', pagado: 'Pagado', vencido: 'Vencido' };
let cartera_cache = [];
let cartera_filtro_tipo = 'por_cobrar';
let modal_cartera_id = null;
let modal_cartera_abonos = [];

async function renderCartera() {
  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="module-header">
      <h2>Cartera</h2>
      <button class="btn" onclick="abrirModalCartera()">+ Nuevo documento</button>
    </div>
    <div class="filter-pills" id="cartera-filtros">
      <button data-tipo="por_cobrar" class="active">Por cobrar</button>
      <button data-tipo="por_pagar">Por pagar</button>
    </div>
    <div class="resumen-cartera" id="cartera-resumen"></div>
    <table class="data-table">
      <thead>
        <tr>
          <th>Concepto</th>
          <th>Cliente / proveedor</th>
          <th>Monto original</th>
          <th>Saldo pendiente</th>
          <th>Vencimiento</th>
          <th>Estado</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="cartera-tbody">
        <tr><td colspan="7">Cargando...</td></tr>
      </tbody>
    </table>
  `;

  document.getElementById('cartera-filtros').addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    document.querySelectorAll('#cartera-filtros button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    cartera_filtro_tipo = btn.dataset.tipo;
    pintarCartera();
  });

  if (!clientes_cache.length) {
    const { data } = await sb.from('clientes').select('*').eq('activo', true);
    clientes_cache = data || [];
  }
  if (!proveedores_cache.length) {
    const { data } = await sb.from('proveedores').select('*').eq('activo', true);
    proveedores_cache = data || [];
  }
  if (!contratos_cache.length) {
    const { data } = await sb.from('contratos').select('*, clientes(razon_social)');
    contratos_cache = data || [];
  }
  if (!cuentas_bancarias_cache.length) {
    const { data } = await sb.from('cuentas_bancarias').select('*');
    cuentas_bancarias_cache = data || [];
  }

  const { data, error } = await sb
    .from('cartera_documentos')
    .select('*, clientes(razon_social), proveedores(razon_social)')
    .order('fecha_vencimiento', { ascending: true });

  if (error) {
    document.getElementById('cartera-tbody').innerHTML =
      '<tr><td colspan="7">Error cargando cartera: ' + escapeHtml(error.message) + '</td></tr>';
    return;
  }
  cartera_cache = data;
  pintarCartera();
}

function pintarCartera() {
  const lista = cartera_cache.filter(d => d.tipo === cartera_filtro_tipo);
  pintarResumenCartera(lista);

  const tbody = document.getElementById('cartera-tbody');
  if (!lista.length) {
    tbody.innerHTML = '<tr><td colspan="7">No hay documentos en esta categoría.</td></tr>';
    return;
  }

  const hoy = new Date().toISOString().slice(0, 10);

  tbody.innerHTML = lista.map(d => {
    const tercero = d.tipo === 'por_cobrar' ? d.clientes?.razon_social : d.proveedores?.razon_social;
    const vencido = d.estado !== 'pagado' && d.fecha_vencimiento && d.fecha_vencimiento < hoy;
    const estadoMostrado = vencido ? 'vencido' : d.estado;
    return `
      <tr>
        <td>${escapeHtml(d.concepto)}</td>
        <td>${escapeHtml(tercero) || '—'}</td>
        <td>$${Number(d.monto_original || 0).toFixed(2)}</td>
        <td>$${Number(d.saldo_pendiente || 0).toFixed(2)}</td>
        <td>${d.fecha_vencimiento || '—'}</td>
        <td><span class="badge cartera-${estadoMostrado}">${ESTADO_CARTERA_LABELS[estadoMostrado] || estadoMostrado}</span></td>
        <td class="row-actions">
          <a onclick="abrirModalCartera('${d.id}')">Ver / abonar</a>
        </td>
      </tr>
    `;
  }).join('');
}

function pintarResumenCartera(lista) {
  const totalOriginal = lista.reduce((acc, d) => acc + Number(d.monto_original || 0), 0);
  const totalPendiente = lista.reduce((acc, d) => acc + Number(d.saldo_pendiente || 0), 0);
  const totalCobrado = totalOriginal - totalPendiente;
  const etiqueta = cartera_filtro_tipo === 'por_cobrar' ? 'cobrado' : 'pagado';

  document.getElementById('cartera-resumen').innerHTML = `
    <div class="resumen-card">
      <div class="label">Total documentos</div>
      <div class="valor">$${totalOriginal.toFixed(2)}</div>
    </div>
    <div class="resumen-card">
      <div class="label">Saldo pendiente</div>
      <div class="valor">$${totalPendiente.toFixed(2)}</div>
    </div>
    <div class="resumen-card">
      <div class="label">Total ${etiqueta}</div>
      <div class="valor">$${totalCobrado.toFixed(2)}</div>
    </div>
  `;
}

async function abrirModalCartera(id) {
  modal_cartera_id = id || null;
  modal_cartera_abonos = [];

  let doc = id ? cartera_cache.find(d => d.id === id) : null;

  if (id) {
    const { data } = await sb
      .from('cartera_abonos')
      .select('*')
      .eq('documento_id', id)
      .order('fecha', { ascending: false });
    modal_cartera_abonos = data || [];
  }

  pintarModalCartera(doc);
}

function pintarModalCartera(doc) {
  const esEdicion = !!doc;
  const tipoActual = doc?.tipo || cartera_filtro_tipo;

  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target === this) closeModal()">
      <div class="modal-card wide">

              <option value="por_cobrar" ${tipoActual === 'por_cobrar' ? 'selected' : ''}>Por cobrar</option>
              <option value="por_pagar" ${tipoActual === 'por_pagar' ? 'selected' : ''}>Por pagar</option>

        </div>
        <div class="field-row">
          <div id="cart-contrato-wrap"></div>

            <label>Monto original</label>

          </div>
        </div>
        <label>Fecha de vencimiento</label>
        <input type="date" id="cart-fecha-vencimiento" value="${doc?.fecha_vencimiento || ''}" ${esEdicion ? 'disabled' : ''}>

        ${esEdicion ? `
          <div class="totales-box">
            <div class="fila"><span>Monto original</span><span>$${Number(doc.monto_original).toFixed(2)}</span></div>
            <div class="fila total"><span>Saldo pendiente</span><span id="cart-saldo-display">$${Number(doc.saldo_pendiente).toFixed(2)}</span></div>
            <div class="saldo-bar"><div class="fill" style="width:${doc.monto_original ? (100 - (doc.saldo_pendiente / doc.monto_original * 100)) : 0}%"></div></div>
          </div>

          <label style="margin-top:20px;">Registrar abono</label>
          <div class="field-row">
            <div>
              <input type="text" id="cart-abono-monto" placeholder="Monto del abono">
            </div>
            <div>
              <input type="date" id="cart-abono-fecha" value="${new Date().toISOString().slice(0,10)}">
            </div>
          </div>
          <label>Cuenta bancaria que ${doc.tipo === 'por_cobrar' ? 'recibe' : 'realiza'} el movimiento</label>
          <div class="field-row">
            <div>
              <select id="cart-abono-cuenta">
                <option value="">Selecciona una cuenta...</option>
                ${cuentas_bancarias_cache.map(c => `<option value="${c.id}">${escapeHtml(c.nombre)} — ${escapeHtml(c.banco)}</option>`).join('')}
              </select>
            </div>
            <div style="flex:0;">
              <button class="btn" style="width:auto;white-space:nowrap;" onclick="registrarAbono()">Registrar</button>
            </div>
          </div>

function onCambioTipoCartera() {
  const tipo = document.getElementById('cart-tipo').value;
  pintarTerceroCartera(tipo, null);
  document.getElementById('cart-contrato-wrap').innerHTML = '';
  if (tipo === 'por_cobrar') pintarContratoCartera(null);
}

function pintarTerceroCartera(tipo, doc) {
  const wrap = document.getElementById('cart-tercero-wrap');
  if (tipo === 'por_cobrar') {
    wrap.innerHTML = `
      <label>Cliente</label>
      <select id="cart-cliente" ${doc ? 'disabled' : ''}>
        <option value="">Selecciona...</option>
        ${clientes_cache.map(c => `<option value="${c.id}" ${doc?.cliente_id === c.id ? 'selected' : ''}>${escapeHtml(c.razon_social)}</option>`).join('')}
      </select>
    `;
  } else {
    wrap.innerHTML = `
      <label>Proveedor</label>
      <select id="cart-proveedor" ${doc ? 'disabled' : ''}>
        <option value="">Selecciona...</option>
        ${proveedores_cache.map(p => `<option value="${p.id}" ${doc?.proveedor_id === p.id ? 'selected' : ''}>${escapeHtml(p.razon_social)}</option>`).join('')}
      </select>
    `;
  }
}

function pintarContratoCartera(doc) {
  document.getElementById('cart-contrato-wrap').innerHTML = `
    <div>
      <label>Contrato relacionado (opcional)</label>
      <select id="cart-contrato" ${doc ? 'disabled' : ''}>
        <option value="">Sin contrato relacionado</option>
        ${contratos_cache.map(c => `<option value="${c.id}" ${doc?.contrato_id === c.id ? 'selected' : ''}>N.° ${escapeHtml(c.numero)} — ${escapeHtml(c.clientes?.razon_social)}</option>`).join('')}
      </select>
    </div>
  `;
}

async function guardarDocumentoCartera() {
  const tipo = document.getElementById('cart-tipo').value;
  const concepto = document.getElementById('cart-concepto').value.trim();
  const montoOriginal = parseFloat(document.getElementById('cart-monto').value) || 0;

  if (!concepto) {
    showMsg('cart-msg', 'El concepto es obligatorio.', 'error');
    return;
  }
  if (montoOriginal <= 0) {
    showMsg('cart-msg', 'El monto original debe ser mayor a cero.', 'error');
    return;
  }

  const payload = {
    tipo: tipo,
    concepto: concepto,
    monto_original: montoOriginal,
    saldo_pendiente: montoOriginal,
    fecha_emision: document.getElementById('cart-fecha-emision').value || null,
    fecha_vencimiento: document.getElementById('cart-fecha-vencimiento').value || null,
    estado: 'pendiente'
  };

  if (tipo === 'por_cobrar') {
    const clienteId = document.getElementById('cart-cliente').value;
    if (!clienteId) { showMsg('cart-msg', 'Selecciona un cliente.', 'error'); return; }
    payload.cliente_id = clienteId;
    const contratoEl = document.getElementById('cart-contrato');
    payload.contrato_id = contratoEl && contratoEl.value ? contratoEl.value : null;
  } else {
    const proveedorId = document.getElementById('cart-proveedor').value;
    if (!proveedorId) { showMsg('cart-msg', 'Selecciona un proveedor.', 'error'); return; }
    payload.proveedor_id = proveedorId;
  }

  const { error } = await sb.from('cartera_documentos').insert(payload);
  if (error) {
    showMsg('cart-msg', 'Error: ' + error.message, 'error');
    return;
  }

  closeModal();
  renderCartera();
}

function pintarAbonosLista() {
  const cont = document.getElementById('cart-abonos-lista');
  if (!modal_cartera_abonos.length) {
    cont.innerHTML = '<p style="color:var(--color-text-muted);font-size:13px;">No se han registrado abonos.</p>';
    return;
  }
  cont.innerHTML = modal_cartera_abonos.map(a => `
    <div class="abono-row">
      <span>${a.fecha || '—'}</span>
      <span>$${Number(a.monto).toFixed(2)}</span>
    </div>
  `).join('');
}

async function registrarAbono() {
  const monto = parseFloat(document.getElementById('cart-abono-monto').value) || 0;
  const fecha = document.getElementById('cart-abono-fecha').value;
  const cuentaId = document.getElementById('cart-abono-cuenta').value;

  if (monto <= 0) {
    showMsg('cart-msg', 'Ingresa un monto de abono válido.', 'error');
    return;
  }
  if (!cuentaId) {
    showMsg('cart-msg', 'Selecciona la cuenta bancaria del movimiento.', 'error');
    return;
  }

  const doc = cartera_cache.find(d => d.id === modal_cartera_id);
  if (monto > doc.saldo_pendiente) {
    showMsg('cart-msg', 'El abono no puede ser mayor al saldo pendiente ($' + Number(doc.saldo_pendiente).toFixed(2) + ').', 'error');
    return;
  }

  const fechaFinal = fecha || new Date().toISOString().slice(0, 10);
  const esIngreso = doc.tipo === 'por_cobrar';

  // 1. Crear el movimiento de Tesorería correspondiente
  const { data: movimiento, error: movError } = await sb
    .from('tesoreria_movimientos')
    .insert({
      cuenta_id: cuentaId,
      tipo: esIngreso ? 'ingreso' : 'egreso',
      origen: esIngreso ? 'cartera_cxc' : 'cartera_cxp',
      origen_id: modal_cartera_id,
      monto: monto,
      fecha: fechaFinal,
      descripcion: doc.concepto
    })
    .select()
    .single();

  if (movError) {
    showMsg('cart-msg', 'Error creando el movimiento de tesorería: ' + movError.message, 'error');
    return;
  }

  // 2. Registrar el abono, vinculado al movimiento recién creado
  const { error: abonoError } = await sb.from('cartera_abonos').insert({
    documento_id: modal_cartera_id,
    fecha: fechaFinal,
    monto: monto,
    movimiento_tesoreria_id: movimiento.id
  });

  if (abonoError) {
    showMsg('cart-msg', 'El movimiento de tesorería se creó, pero hubo un error registrando el abono: ' + abonoError.message, 'error');
    return;
  }

  // 3. Actualizar saldo de la cuenta bancaria
  const cuenta = cuentas_bancarias_cache.find(c => c.id === cuentaId);
  const nuevoSaldoCuenta = Number(cuenta.saldo_actual || 0) + (esIngreso ? monto : -monto);
  await sb.from('cuentas_bancarias').update({ saldo_actual: nuevoSaldoCuenta }).eq('id', cuentaId);
  cuenta.saldo_actual = nuevoSaldoCuenta;

  // 4. Actualizar saldo y estado del documento de cartera
  const nuevoSaldo = doc.saldo_pendiente - monto;
  const nuevoEstado = nuevoSaldo <= 0 ? 'pagado' : 'parcial';

  const { error: updateError } = await sb
    .from('cartera_documentos')
    .update({ saldo_pendiente: nuevoSaldo, estado: nuevoEstado })
    .eq('id', modal_cartera_id);

  if (updateError) {
    showMsg('cart-msg', 'Abono registrado, pero hubo un error actualizando el saldo: ' + updateError.message, 'error');
    return;
  }

  doc.saldo_pendiente = nuevoSaldo;
  doc.estado = nuevoEstado;

  const { data } = await sb
    .from('cartera_abonos')
    .select('*')
    .eq('documento_id', modal_cartera_id)
    .order('fecha', { ascending: false });
  modal_cartera_abonos = data || [];

  pintarModalCartera(doc);
}

let cuentas_bancarias_cache = [];

async function renderTesoreria() {
  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="module-header">
      <h2>Tesorería</h2>
    </div>
    <div class="subtabs-bar" id="tesoreria-subtabs">
      <button data-tab="movimientos" class="active">Movimientos</button>
      <button data-tab="nomina">Nómina</button>
    </div>
    <div id="tesoreria-content"></div>
  `;

  document.getElementById('tesoreria-subtabs').addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    document.querySelectorAll('#tesoreria-subtabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    tesoreria_subtab = btn.dataset.tab;
    if (tesoreria_subtab === 'movimientos') renderTabMovimientos();

async function guardarMovimiento() {
  const cuentaId = document.getElementById('mov-cuenta').value;
  const tipo = document.getElementById('mov-tipo').value;
  const monto = parseFloat(document.getElementById('mov-monto').value) || 0;
  const fecha = document.getElementById('mov-fecha').value;

  if (!cuentaId) { showMsg('mov-msg', 'Selecciona una cuenta.', 'error'); return; }
  if (monto <= 0) { showMsg('mov-msg', 'Ingresa un monto válido.', 'error'); return; }

  const { error } = await sb.from('tesoreria_movimientos').insert({
    cuenta_id: cuentaId,
    tipo: tipo,
    origen: 'otro',
    monto: monto,
    fecha: fecha || null,
    descripcion: document.getElementById('mov-descripcion').value.trim()
  });

  if (error) {
    showMsg('mov-msg', 'Error: ' + error.message, 'error');
    return;
  }

  const cuenta = cuentas_bancarias_cache.find(c => c.id === cuentaId);
  const nuevoSaldo = Number(cuenta.saldo_actual || 0) + (tipo === 'ingreso' ? monto : -monto);
  await sb.from('cuentas_bancarias').update({ saldo_actual: nuevoSaldo }).eq('id', cuentaId);

  closeModal();
  renderTesoreria();
}

async function abrirModalRolPago(id) {
  modal_rol_pago_id = id || null;
  let rol = id ? roles_pago_cache.find(r => r.id === id) : null;
  modal_rol_detalle = [];

  if (!empleados_cache.length) {
    const { data } = await sb.from('empleados').select('*').eq('activo', true);
    empleados_cache = data || [];
  }

  if (id) {
    const { data } = await sb
      .from('nomina_detalle')
      .select('*, empleados(nombre_completo)')
      .eq('rol_pago_id', id);
    modal_rol_detalle = data || [];
  } else {
    // Pre-cargar todos los empleados activos con su sueldo base
    modal_rol_detalle = empleados_cache.filter(e => e.activo).map(e => ({
      empleado_id: e.id,
      empleados: { nombre_completo: e.nombre_completo },
      sueldo: e.sueldo_base || 0,
      otros_ingresos: 0,
      deducciones: 0
    }));

        </div>
      </div>

  pintarDetalleRolPago(bloqueado);

function pintarDetalleRolPago(bloqueado) {
  const cont = document.getElementById('rol-detalle-rows');
  cont.innerHTML = modal_rol_detalle.map((d, idx) => {
    const liquido = (parseFloat(d.sueldo) || 0) + (parseFloat(d.otros_ingresos) || 0) - (parseFloat(d.deducciones) || 0);
    if (bloqueado) {
      return `
        <div class="nomina-detalle-row">
          <div>${escapeHtml(d.empleados?.nombre_completo)}</div>
          <div>$${Number(d.sueldo).toFixed(2)}</div>
          <div>$${Number(d.otros_ingresos).toFixed(2)}</div>
          <div>$${Number(d.deducciones).toFixed(2)}</div>
          <div>$${liquido.toFixed(2)}</div>
        </div>
      `;
    }
    return `
      <div class="nomina-detalle-row">
        <div>${escapeHtml(d.empleados?.nombre_completo)}</div>
        <div><input type="text" value="${d.sueldo}" onchange="actualizarDetalleRol(${idx}, 'sueldo', this.value)"></div>
        <div><input type="text" value="${d.otros_ingresos}" onchange="actualizarDetalleRol(${idx}, 'otros_ingresos', this.value)"></div>
        <div><input type="text" value="${d.deducciones}" onchange="actualizarDetalleRol(${idx}, 'deducciones', this.value)"></div>
        <div>$${liquido.toFixed(2)}</div>
      </div>
    `;
  }).join('');

  calcularTotalRolPago();
}

function actualizarDetalleRol(idx, campo, valor) {
  modal_rol_detalle[idx][campo] = valor;
  pintarDetalleRolPago(false);
}

function calcularTotalRolPago() {
  const total = modal_rol_detalle.reduce((acc, d) =>
    acc + (parseFloat(d.sueldo) || 0) + (parseFloat(d.otros_ingresos) || 0) - (parseFloat(d.deducciones) || 0), 0);
  document.getElementById('rol-total-display').textContent = '$' + total.toFixed(2);
  return total;
}

async function guardarRolPago(seraPagado) {
  const periodo = document.getElementById('rol-periodo').value.trim();
  if (!periodo) {
    showMsg('rol-msg', 'El periodo es obligatorio (ej. 2026-06).', 'error');
    return;
  }

  const total = calcularTotalRolPago();
  const payload = {
    periodo: periodo,
    fecha_pago: document.getElementById('rol-fecha-pago').value || null,
    estado: seraPagado ? 'pagado' : 'borrador',
    total_pagado: total
  };

  if (modal_rol_pago_id) {
    const { error } = await sb.from('nomina_roles_pago').update(payload).eq('id', modal_rol_pago_id);
    if (error) { showMsg('rol-msg', 'Error: ' + error.message, 'error'); return null; }
  } else {
    const { data, error } = await sb.from('nomina_roles_pago').insert(payload).select().single();
    if (error) { showMsg('rol-msg', 'Error: ' + error.message, 'error'); return null; }
    modal_rol_pago_id = data.id;
  }

  // Reescribir el detalle: borrar el anterior e insertar de nuevo
  await sb.from('nomina_detalle').delete().eq('rol_pago_id', modal_rol_pago_id);

  const detallePayload = modal_rol_detalle.map(d => ({
    rol_pago_id: modal_rol_pago_id,
    empleado_id: d.empleado_id,
    sueldo: parseFloat(d.sueldo) || 0,
    otros_ingresos: parseFloat(d.otros_ingresos) || 0,
    deducciones: parseFloat(d.deducciones) || 0
  }));

  const { error: detalleError } = await sb.from('nomina_detalle').insert(detallePayload);
  if (detalleError) {
    showMsg('rol-msg', 'Rol guardado, pero hubo un error con el detalle: ' + detalleError.message, 'error');
    return null;
  }

  return modal_rol_pago_id;
}

async function pagarRolNomina() {
  const cuentaSelect = cuentas_bancarias_cache.length
    ? cuentas_bancarias_cache.map((c, i) => `${i + 1}. ${c.nombre}`).join('\n')
    : null;

  if (!cuentaSelect) {
    showMsg('rol-msg', 'Primero registra al menos una cuenta bancaria en la pestaña Movimientos.', 'error');
    return;
  }

  const seleccion = prompt('¿Desde qué cuenta se pagará la nómina?\n\n' + cuentaSelect + '\n\nEscribe el número de la cuenta:');
  const idx = parseInt(seleccion) - 1;
  if (isNaN(idx) || !cuentas_bancarias_cache[idx]) {
    showMsg('rol-msg', 'Selección de cuenta inválida. No se procesó el pago.', 'error');
    return;
  }
  const cuenta = cuentas_bancarias_cache[idx];

  if (!confirm('¿Confirmas el pago de la nómina del periodo desde la cuenta "' + cuenta.nombre + '"? Esto generará un movimiento de egreso por cada empleado.')) {
    return;
  }

  const rolId = await guardarRolPago(true);
  if (!rolId) return;

  // Crear un movimiento de egreso por cada empleado del detalle
  const fechaPago = document.getElementById('rol-fecha-pago').value || new Date().toISOString().slice(0, 10);
  let totalPagado = 0;

  for (const d of modal_rol_detalle) {
    const liquido = (parseFloat(d.sueldo) || 0) + (parseFloat(d.otros_ingresos) || 0) - (parseFloat(d.deducciones) || 0);
    totalPagado += liquido;

    await sb.from('tesoreria_movimientos').insert({
      cuenta_id: cuenta.id,
      tipo: 'egreso',
      origen: 'nomina',
      origen_id: rolId,
      monto: liquido,
      fecha: fechaPago,
      descripcion: 'Pago de nómina — ' + (d.empleados?.nombre_completo || '')
    });
  }

  const nuevoSaldo = Number(cuenta.saldo_actual || 0) - totalPagado;
  await sb.from('cuentas_bancarias').update({ saldo_actual: nuevoSaldo }).eq('id', cuenta.id);
  cuenta.saldo_actual = nuevoSaldo;

  alert('Nómina pagada correctamente. Se generaron ' + modal_rol_detalle.length + ' movimientos de egreso en Tesorería.');
  closeModal();
  renderTabNomina();
}

// =====================================================================
// MÓDULO: CHAT
// =====================================================================
let chat_canal_id = null;
let chat_mensajes_cache = [];
let chat_perfiles_cache = {}; // id -> perfil, para mostrar nombres y presencia
let chat_realtime_channel = null;
let chat_presencia_channel = null;
let chat_usuario_actual = null;

async function renderChat() {
  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="chat-shell">
      <aside class="chat-sidebar">
        <h4>Canales</h4>
        <div class="chat-canal-item active">General</div>
        <h4 style="margin-top:24px;">En línea ahora</h4>
        <div id="chat-presencia-lista"></div>
      </aside>
      <div class="chat-main">
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-bar">
          <input type="text" id="chat-input" placeholder="Escribe un mensaje...">
          <button class="btn" onclick="enviarMensajeChat()">Enviar</button>
        </div>
      </div>
      <div class="chat-thread-panel hidden" id="chat-thread-panel">
        <div class="chat-thread-header">
          <span>Hilo</span>
          <a onclick="cerrarHiloChat()">✕</a>
        </div>
        <div class="chat-thread-root" id="chat-thread-root"></div>
        <div class="chat-thread-messages" id="chat-thread-messages"></div>
        <div class="chat-input-bar">
          <input type="text" id="chat-thread-input" placeholder="Responder en el hilo...">
          <button class="btn" onclick="enviarRespuestaHilo()">Enviar</button>
        </div>
      </div>
    </div>
  `;

  document.getElementById('chat-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') enviarMensajeChat();
  });
  document.getElementById('chat-thread-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') enviarRespuestaHilo();
  });

  const { data: { user } } = await sb.auth.getUser();
  chat_usuario_actual = user;

  // Cargar todos los perfiles (para mostrar nombres en mensajes y presencia)
  const { data: perfiles } = await sb.from('perfiles').select('id, nombre_completo, email');
  (perfiles || []).forEach(p => { chat_perfiles_cache[p.id] = p; });

  // Asegurar que exista el canal "General"
  let { data: canal } = await sb.from('canales_chat').select('*').eq('tipo', 'general').maybeSingle();
  if (!canal) {
    const { data: nuevoCanal } = await sb
      .from('canales_chat')
      .insert({ nombre: 'General', tipo: 'general' })
      .select()
      .single();
    canal = nuevoCanal;
  }
  chat_canal_id = canal.id;

  await cargarMensajesChat();
  await marcarPresenciaEnLinea();
  suscribirRealtimeChat();
  suscribirPresenciaChat();
}

async function cargarMensajesChat() {
  const { data, error } = await sb
    .from('mensajes')
    .select('*')
    .eq('canal_id', chat_canal_id)
    .order('created_at', { ascending: true });

  if (error) {
    document.getElementById('chat-messages').innerHTML =
      '<p style="color:var(--color-danger);">Error cargando mensajes: ' + escapeHtml(error.message) + '</p>';
    return;
  }
  chat_mensajes_cache = data || [];
  pintarMensajesChat();
}

function pintarMensajesChat() {
  const cont = document.getElementById('chat-messages');
  if (!cont) return;

  const raiz = chat_mensajes_cache.filter(m => !m.mensaje_padre_id);

  if (!raiz.length) {
    cont.innerHTML = '<p style="color:var(--color-text-muted);font-size:13px;">Aún no hay mensajes en este canal. ¡Sé el primero en escribir!</p>';
    return;
  }

  cont.innerHTML = raiz.map(m => renderBurbujaChat(m)).join('');
  cont.scrollTop = cont.scrollHeight;

  // Si el hilo abierto sigue existiendo, refrescar su contenido también
  if (chat_hilo_abierto_id) {
    pintarPanelHilo();
  }
}

function contarRespuestas(mensajeId) {
  return chat_mensajes_cache.filter(m => m.mensaje_padre_id === mensajeId && !m.eliminado).length;
}

function renderBurbujaChat(m) {
  const esMio = m.autor_id === chat_usuario_actual?.id;
  const autor = chat_perfiles_cache[m.autor_id];
  const nombreAutor = autor?.nombre_completo || autor?.email || 'Usuario';
  const hora = m.created_at ? new Date(m.created_at).toLocaleTimeString('es-EC', { hour: '2-digit', minute: '2-digit' }) : '';
  const lado = esMio ? 'mine' : 'theirs';
  const numRespuestas = contarRespuestas(m.id);

  if (m.eliminado) {
    return `
      <div class="chat-bubble-wrap ${lado}">
        <div class="chat-bubble eliminado">Mensaje eliminado</div>
      </div>
    `;
  }

  return `
    <div class="chat-bubble-wrap ${lado}">
      <div class="chat-bubble ${lado}">
        ${!esMio ? '<div class="autor">' + escapeHtml(nombreAutor) + '</div>' : ''}
        <div>${escapeHtml(m.contenido)}</div>
        <div class="hora">${hora}</div>
      </div>
      <div class="chat-bubble-actions ${lado}">
        <a onclick="abrirHiloChat('${m.id}')">Responder</a>
        ${esMio ? '<a onclick="eliminarMensajeChat(\'' + m.id + '\')">Eliminar</a>' : ''}
      </div>
      ${numRespuestas > 0 ? `<div class="chat-respuestas-link" onclick="abrirHiloChat('${m.id}')">${numRespuestas} respuesta${numRespuestas > 1 ? 's' : ''}</div>` : ''}
    </div>
  `;
}

let chat_hilo_abierto_id = null;

function abrirHiloChat(mensajeId) {
  chat_hilo_abierto_id = mensajeId;
  document.getElementById('chat-thread-panel').classList.remove('hidden');
  pintarPanelHilo();
  document.getElementById('chat-thread-input').focus();
}

function cerrarHiloChat() {
  chat_hilo_abierto_id = null;
  document.getElementById('chat-thread-panel').classList.add('hidden');
}

function pintarPanelHilo() {
  if (!chat_hilo_abierto_id) return;
  const raiz = chat_mensajes_cache.find(m => m.id === chat_hilo_abierto_id);
  if (!raiz) { cerrarHiloChat(); return; }

  document.getElementById('chat-thread-root').innerHTML = renderMensajeSimpleHilo(raiz);

  const respuestas = chat_mensajes_cache
    .filter(m => m.mensaje_padre_id === chat_hilo_abierto_id)
    .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

  const cont = document.getElementById('chat-thread-messages');
  if (!respuestas.length) {
    cont.innerHTML = '<p style="color:var(--color-text-muted);font-size:12px;">Aún no hay respuestas en este hilo.</p>';
  } else {
    cont.innerHTML = respuestas.map(m => renderMensajeSimpleHilo(m, true)).join('');
  }
  cont.scrollTop = cont.scrollHeight;
}

function renderMensajeSimpleHilo(m, conAccionEliminar) {
  const esMio = m.autor_id === chat_usuario_actual?.id;
  const autor = chat_perfiles_cache[m.autor_id];
  const nombreAutor = autor?.nombre_completo || autor?.email || 'Usuario';
  const hora = m.created_at ? new Date(m.created_at).toLocaleTimeString('es-EC', { hour: '2-digit', minute: '2-digit' }) : '';

  if (m.eliminado) {
    return `<div class="chat-bubble-wrap ${esMio ? 'mine' : 'theirs'}"><div class="chat-bubble eliminado">Mensaje eliminado</div></div>`;
  }

  return `
    <div class="chat-bubble-wrap ${esMio ? 'mine' : 'theirs'}">
      <div class="chat-bubble ${esMio ? 'mine' : 'theirs'}">
        <div class="autor">${escapeHtml(nombreAutor)}</div>
        <div>${escapeHtml(m.contenido)}</div>
        <div class="hora">${hora}</div>
      </div>
      ${conAccionEliminar && esMio ? `<div class="chat-bubble-actions mine"><a onclick="eliminarMensajeChat('${m.id}')">Eliminar</a></div>` : ''}
    </div>
  `;
}

async function enviarRespuestaHilo() {
  const input = document.getElementById('chat-thread-input');
  const contenido = input.value.trim();
  if (!contenido || !chat_hilo_abierto_id) return;

  input.value = '';

  const { error } = await sb.from('mensajes').insert({
    canal_id: chat_canal_id,
    autor_id: chat_usuario_actual.id,
    contenido: contenido,
    mensaje_padre_id: chat_hilo_abierto_id
  });

  if (error) {
    alert('Error enviando respuesta: ' + error.message);
  }
}

async function eliminarMensajeChat(mensajeId) {
  const mensaje = chat_mensajes_cache.find(m => m.id === mensajeId);
  const esRaiz = !mensaje.mensaje_padre_id;
  const hijos = esRaiz ? chat_mensajes_cache.filter(m => m.mensaje_padre_id === mensajeId) : [];

  const confirmacion = hijos.length
    ? '¿Eliminar este mensaje? Tiene ' + hijos.length + ' respuesta(s) que también se eliminarán.'
    : '¿Eliminar este mensaje? Quedará marcado como "Mensaje eliminado" para todos.';

  if (!confirm(confirmacion)) return;

  // El botón "Eliminar" solo se muestra en mensajes propios, así que el
  // mensaje raíz siempre pertenece al usuario actual. Si tiene hijos
  // (respuestas de cualquier persona), se eliminan en cascada también.
  const { error: errorRaiz } = await sb
    .from('mensajes')
    .update({ eliminado: true, eliminado_en: new Date().toISOString() })
    .eq('id', mensajeId)
    .eq('autor_id', chat_usuario_actual.id);

  if (errorRaiz) {
    alert('Error eliminando mensaje: ' + errorRaiz.message);
    return;
  }

  if (hijos.length) {
    await sb
      .from('mensajes')
      .update({ eliminado: true, eliminado_en: new Date().toISOString() })
      .in('id', hijos.map(h => h.id));
  }

  const idsAfectados = [mensajeId, ...hijos.map(h => h.id)];
  idsAfectados.forEach(id => {
    const idx = chat_mensajes_cache.findIndex(m => m.id === id);
    if (idx !== -1) chat_mensajes_cache[idx].eliminado = true;
  });
  pintarMensajesChat();
}

async function enviarMensajeChat() {
  const input = document.getElementById('chat-input');
  const contenido = input.value.trim();
  if (!contenido) return;

  input.value = '';

  const { error } = await sb.from('mensajes').insert({
    canal_id: chat_canal_id,
    autor_id: chat_usuario_actual.id,
    contenido: contenido,
    mensaje_padre_id: null
  });

  if (error) {
    alert('Error enviando mensaje: ' + error.message);
  }
  // No recargamos manualmente — el mensaje propio también llega vía
  // la suscripción Realtime, igual que los de otros usuarios.
}

function suscribirRealtimeChat() {
  if (chat_realtime_channel) {
    sb.removeChannel(chat_realtime_channel);
  }

  chat_realtime_channel = sb
    .channel('mensajes-canal-' + chat_canal_id)
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'mensajes',
      filter: 'canal_id=eq.' + chat_canal_id
    }, (payload) => {
      chat_mensajes_cache.push(payload.new);
      pintarMensajesChat();
    })
    .on('postgres_changes', {
      event: 'UPDATE',
      schema: 'public',
      table: 'mensajes',
      filter: 'canal_id=eq.' + chat_canal_id
    }, (payload) => {
      const idx = chat_mensajes_cache.findIndex(m => m.id === payload.new.id);
      if (idx !== -1) {
        chat_mensajes_cache[idx] = payload.new;
        pintarMensajesChat();
      }
    })
    .subscribe();
}

async function marcarPresenciaEnLinea() {
  await sb.from('presencia').upsert({
    perfil_id: chat_usuario_actual.id,
    en_linea: true,
    ultima_actividad: new Date().toISOString()
  });

  // Marcar como desconectado al cerrar la pestaña/navegar fuera
  window.addEventListener('beforeunload', () => {
    sb.from('presencia').update({ en_linea: false }).eq('perfil_id', chat_usuario_actual.id);
  });

  await cargarPresenciaChat();
}

async function cargarPresenciaChat() {
  const { data } = await sb.from('presencia').select('*').eq('en_linea', true);
  pintarPresenciaChat(data || []);
}

function pintarPresenciaChat(lista) {
  const cont = document.getElementById('chat-presencia-lista');
  if (!cont) return;

  if (!lista.length) {
    cont.innerHTML = '<p style="font-size:12px;color:var(--color-text-muted);padding:0 16px;">Nadie en línea.</p>';
    return;
  }

  cont.innerHTML = lista.map(p => {
    const perfil = chat_perfiles_cache[p.perfil_id];
    const nombre = perfil?.nombre_completo || perfil?.email || 'Usuario';
    return `
      <div class="chat-presencia-item">
        <span class="chat-presencia-dot online"></span>
        <span>${escapeHtml(nombre)}</span>
      </div>
    `;
  }).join('');
}

function suscribirPresenciaChat() {
  if (chat_presencia_channel) {
    sb.removeChannel(chat_presencia_channel);
  }

  chat_presencia_channel = sb
    .channel('presencia-global')
    .on('postgres_changes', {
      event: '*',
      schema: 'public',
      table: 'presencia'
    }, () => {
      cargarPresenciaChat();
    })
    .subscribe();
}

init();
</script>
